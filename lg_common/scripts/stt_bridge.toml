[bridge]
name = "stt_bridge"
input_topic = "/stt"
output_topic = "/llm/response"
queue_max = 16

[ollama]
base_url = "http://127.0.0.1:11434"
system = ""
connect_timeout = 7.0
read_timeout = 140.0
candidate_base = "/llm"

[LLM_KML]
quick_model = "granite4:micro-h"
json_model = "granite4:latest"
json_system_prompt = """
You are a structured planner that outputs valid JSON.
Schema: {"task": string, "params": string}
"""
quick_template = "User said:\n{transcript}\n\nRespond briefly to acknowledge receipt."
json_template = "Input:\n{transcript}"

[handler]
type = "LLM_KML"
models = ["qwen2.5:1.5b", "llama3.2:1b", "tinyllama"]
aggregator_model = "llama3.2:1b"
aggregator_system = ""
debug = true
max_workers = 4

[handler.candidate_options]
num_predict = 160
temperature = 0.5
top_p = 0.9
top_k = 40
repeat_penalty = 1.15
repeat_last_n = 256
num_ctx = 4096
num_thread = 8

[handler.agg_options]
num_predict = 220
temperature = 0.4
top_p = 0.9
top_k = 40
repeat_penalty = 1.15
repeat_last_n = 256
num_ctx = 4096

[prompts]
prompt_template = """
[SYSTEM]
Be precise and factual. Prefer short, concrete sentences. Do not invent specifics or add cordialities.
[TRANSCRIPT START]
{transcript}
[TRANSCRIPT END]

[RESPONSE STYLE]
One clear paragraph, 1 to 5 sentences.
"""

aggregate_template = """
[SYSTEM]
Synthesize the best single answer from multiple candidates to address the transcript.
Resolve conflicts by preferring factual statements and internal consistency.

[TRANSCRIPT]
{transcript}

[CANDIDATES]
{candidates}

[INSTRUCTIONS]
- Produce one cohesive answer in 1 short paragraph.
- If follow-up is needed, include exactly one actionable next step.
"""
