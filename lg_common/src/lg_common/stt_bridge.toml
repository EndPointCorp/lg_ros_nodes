[bridge]
name = "stt_bridge"
input_topic = "/stt"
output_topic = "/llm/response"
queue_max = 16

[ollama]
base_url = "http://127.0.0.1:11434"
system = ""                # optional global system prompt
connect_timeout = 7.0
read_timeout = 200.0
candidate_base = "/llm"    # publishes /llm/<model> if VPNode is provided

[LLM_KML]
# Model used for the fast user acknowledgement.
quick_model = "granite4:micro-h"
# Tool-planning model (exposed via OllamaToolClient loop).
json_model = "granite4_kml_tools"
# Leave empty to use the system prompt baked into the Modelfile; override here if needed.
# json_system_prompt = "..."
quick_template = "{transcript}"
json_template = "{transcript}"
# Directory where numbered KML/TXT/JSONL artifacts (000001.*) are written.
tool_output_dir = "/mnt/videos/vp_kmls"

[LLM_KML.json_options]
# Conservative defaults that run comfortably on an 8 GB VRAM (GTX 1080) setup.
num_predict = 256
num_ctx = 2048
temperature = 0.2
top_p = 0.8
top_k = 40
repeat_penalty = 1.1
repeat_last_n = 128
num_thread = 4

[LLM_KML.tool_options]
# Applied to the interactive tool loop (OllamaToolClient).
num_predict = 256
num_ctx = 2048
temperature = 0.2
top_p = 0.8
top_k = 40
repeat_penalty = 1.1
repeat_last_n = 128
num_thread = 4


[handler]
## type = "llm_aggregator"    # "llm_aggregator" or "echo"
type = "LLM_KML"    # or "LLM_AGG, or "echo"
models = ["granite4:micro-h"]
# aggregator_model = "granite4:micro-h"      # optional, omit for first-nonempty fallback
# aggregator_system = ""                    # optional system prompt for aggregator pass
# max_transcript_chars = 2000     # clip long ASR blobs
debug = true
max_workers = 2

[handler.candidate_options]
num_predict = 80
temperature = 0.25
top_p = 0.8
top_k = 40
repeat_penalty = 1.05
repeat_last_n = 64
num_ctx     = 1024   # fits comfortably in 8 GB VRAM with q4 quant models
num_thread  = 4      # adjust to your physical CPU cores
# Additional knobs you can experiment with (uncomment to enable):
# # gpu_layers = 40
# # mirostat = 2
# # mirostat_tau = 5.0
# # mirostat_eta = 0.1
# # stop = ["User:", "Assistant:"]
# # temperature = 0.25        # tighten variability further
# # top_k = 0                 # let top_p control sampling exclusively

[handler.agg_options]
num_predict = 220
temperature = 0.3
top_p = 0.85
top_k = 40
repeat_penalty = 1.1
repeat_last_n = 128
num_ctx     = 2048
# Try Mirostat on the aggregator pass only:
# mirostat = 2
# mirostat_tau = 5.0
# mirostat_eta = 0.1


[prompts]
# Base prompt body (only the transcript).
prompt_template = "{transcript}"

# Aggregation template (optional if not aggregating separately)
aggregate_template = "{transcript}"
